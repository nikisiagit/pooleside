<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="pooleside - Gallery.">
    <title>pooleside | Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Pacifico&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Sun Flares -->
    <div class="sun-flare sun-flare-1"></div>
    <div class="sun-flare sun-flare-2"></div>
    <div class="sun-flare sun-flare-3"></div>

    <!-- Header Navigation -->
    <header class="header">
        <div class="container" style="position: relative; z-index: 100;">
            <a href="index.html" class="logo-text">
                <img src="assets/logo.png" alt="pooleside" class="nav-logo">
            </a>
            
            <!-- Burger Button (Sea Waves) -->
            <button id="burgerBtn" class="burger-btn" aria-label="Toggle navigation">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 6c.6.5 1.2 1 2.5 1 1.5 0 2-.5 3-1 1.5-1 2-1 3-1 1.5 0 2 .5 3 1 1.5 1 2 1 3 1 1.5 0 2-.5 2.5-1"></path>
                  <path d="M2 12c.6.5 1.2 1 2.5 1 1.5 0 2-.5 3-1 1.5-1 2-1 3-1 1.5 0 2 .5 3 1 1.5 1 2 1 3 1 1.5 0 2-.5 2.5-1"></path>
                  <path d="M2 18c.6.5 1.2 1 2.5 1 1.5 0 2-.5 3-1 1.5-1 2-1 3-1 1.5 0 2 .5 3 1 1.5 1 2 1 3 1 1.5 0 2-.5 2.5-1"></path>
                </svg>
            </button>

            <!-- Navigation Overlay -->
            <nav id="navMenu" class="nav-overlay">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="gallery.html" class="nav-link">Gallery</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- Gallery Section -->
    <section style="padding-top: 150px;">
        <div class="container">
            <h2 class="section-title" style="text-align: center; margin-bottom: 60px;">Moments</h2>
            <div id="galleryGrid" class="photos-grid" style="opacity: 0; transition: opacity 1.5s ease-in;"></div>
        </div>
    </section>

    <script src="gallery.js"></script>
</body>

</html>
