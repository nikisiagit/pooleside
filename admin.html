<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pooleside Radio Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .admin-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        input[type="text"], input[type="number"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #f8f9fa;
            border: 1px dashed #ccc;
            border-radius: 6px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #333;
        }
        button:disabled {
            background: #999;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-size: 0.9rem;
        }
        .status.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1>Upload New Track</h1>
        <form id="uploadForm">
            <div class="form-group">
                <label for="password">Admin Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter secret API password">
            </div>
            
            <div class="form-group">
                <label for="title">Track Title</label>
                <input type="text" id="title" name="title" required placeholder="e.g. Summer Breeze">
            </div>

            <div class="form-group">
                <label for="artist">Artist Name</label>
                <input type="text" id="artist" name="artist" required placeholder="e.g. Pooleside Sounds" value="Pooleside Sounds">
            </div>

            <div class="form-group">
                <label for="duration">Duration (in seconds)</label>
                <input type="number" id="duration" name="duration" required placeholder="e.g. 240">
                <small style="display:block; margin-top:4px; color:#666;">Tip: Wait for file select to auto-detect duration.</small>
            </div>

            <div class="form-group">
                <label for="file">Audio File (.mp3, .wav)</label>
                <input type="file" id="file" name="file" accept="audio/*" required>
            </div>

            <button type="submit" id="submitBtn">Upload Track</button>
            <div id="statusMessage" class="status"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('file');
        const durationInput = document.getElementById('duration');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        // Auto-detect audio duration
        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                const audio = document.createElement('audio');
                audio.src = URL.createObjectURL(file);
                audio.addEventListener('loadedmetadata', function() {
                    durationInput.value = Math.round(audio.duration);
                    URL.revokeObjectURL(audio.src);
                });
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Uploading... Please wait.';
            statusMessage.className = 'status';
            
            const formData = new FormData(form);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    statusMessage.textContent = 'Success! Track added to live stream.';
                    statusMessage.className = 'status success';
                    form.reset();
                } else {
                    statusMessage.textContent = 'Error: ' + (result.error || 'Upload failed');
                    statusMessage.className = 'status error';
                }
            } catch (err) {
                statusMessage.textContent = 'Network Error: ' + err.message;
                statusMessage.className = 'status error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Upload Track';
            }
        });
    </script>
</body>
</html>
