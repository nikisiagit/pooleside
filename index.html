<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="pooleside - Coastal vibes only.">
    <title>pooleside | Coastal Vibes Only</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header Navigation -->
    <header class="header">
        <div class="container" style="position: relative; z-index: 100;">
            <!-- Tagline -->
            <div class="header-tagline">
                Celebrating life in Poole and surrounding coastline<br>through music and photography
            </div>

            <a href="index.html" class="logo-text">
                <img src="assets/logo.png" alt="pooleside" class="nav-logo">
            </a>
            
            <!-- Burger Button (Sea Waves) -->
            <button id="burgerBtn" class="burger-btn" aria-label="Toggle navigation">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 6c.6.5 1.2 1 2.5 1 1.5 0 2-.5 3-1 1.5-1 2-1 3-1 1.5 0 2 .5 3 1 1.5 1 2 1 3 1 1.5 0 2-.5 2.5-1"></path>
                  <path d="M2 12c.6.5 1.2 1 2.5 1 1.5 0 2-.5 3-1 1.5-1 2-1 3-1 1.5 0 2 .5 3 1 1.5 1 2 1 3 1 1.5 0 2-.5 2.5-1"></path>
                  <path d="M2 18c.6.5 1.2 1 2.5 1 1.5 0 2-.5 3-1 1.5-1 2-1 3-1 1.5 0 2 .5 3 1 1.5 1 2 1 3 1 1.5 0 2-.5 2.5-1"></path>
                </svg>
            </button>

            <!-- Navigation Overlay -->
            <nav id="navMenu" class="nav-overlay">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- Cover Flow Gallery Section -->
    <section class="gallery-section">
        <div class="cover-flow-container" id="coverFlowContainer">
            <!-- Images will be injected here via script.js -->
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
