<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="pooleside - Coastal vibes only.">
    <title>pooleside | Coastal Vibes Only</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-top">
                <a href="index.html" class="logo">
                    <img src="assets/logo.png" alt="pooleside" class="nav-logo">
                </a>
                <div class="tagline mono">
                    Celebrating life in Poole<br>and surrounding coastline<br>through music and photography
                </div>
                
                <nav class="sidebar-links mono">
                    <a href="https://bhculturecalendar.co.uk/" target="_blank" rel="noopener noreferrer" class="sidebar-link">
                        <span>BH Culture Calendar</span>
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </a>
                    <a href="https://www.pooletourism.com/" target="_blank" rel="noopener noreferrer" class="sidebar-link">
                        <span>Poole Tourism</span>
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </a>
                    <a href="https://www.bournemouth.co.uk/" target="_blank" rel="noopener noreferrer" class="sidebar-link">
                        <span>Bournemouth Tourism</span>
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </a>
                    <a href="https://www.nationaltrust.org.uk/visit/whats-on?type=event&region=dorset&page=2#find-out-whats-on-near-you" target="_blank" rel="noopener noreferrer" class="sidebar-link">
                        <span>National Trust Events in Dorset</span>
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </a>
                </nav>
            </div>
            
            <div class="sidebar-bottom">
                <div class="nav-radio-player" id="navRadioPlayer">
                    <div class="radio-header mono">[ RADIO STREAM ]</div>
                    <div class="radio-controls">
                        <button class="radio-control-btn" id="navRadioPlayBtn" aria-label="Play Radio">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" class="play-icon" id="navRadioPlayIcon"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        </button>
                        <div class="radio-info">
                            <span class="radio-status mono">LIVE</span>
                            <div class="marquee-container mono">
                                <span class="marquee-text" id="navRadioTrackName">Loading stream...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <section class="gallery-section">
                <div class="photo-gallery-grid" id="galleryContainer">
                    <!-- Images will be injected here via script.js -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
